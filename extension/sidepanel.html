<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alcentric</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- État de chargement -->
    <div id="loading" class="state">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>

    <!-- État non connecté -->
    <div id="login-prompt" class="state hidden">
      <div class="login-prompt-content">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
            <path d="M2 12h20"/>
          </svg>
          <h1>Alcentric</h1>
        </div>
        
        <p class="login-prompt-text">
          Connectez-vous pour accéder à votre assistant IA personnel.
        </p>
        
        <button id="open-login-btn" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Se connecter sur Alcentric
        </button>
        
        <p class="login-prompt-hint">
          Pas encore de compte ? <a href="#" id="open-register-link">Créer un compte</a>
        </p>
      </div>
    </div>

    <!-- État connecté - Chat IA -->
    <div id="logged-in" class="state hidden">
      <div class="header">
        <div class="header-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
            <path d="M2 12h20"/>
          </svg>
          <span>Alcentric</span>
        </div>
        <div class="header-actions">
          <button id="new-chat-btn" class="btn-icon" title="Nouvelle conversation">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
          <div class="profile-dropdown">
            <button id="profile-btn" class="btn-icon profile-btn" title="Profil">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="5"/>
                <path d="M20 21a8 8 0 1 0-16 0"/>
              </svg>
            </button>
            <div id="profile-menu" class="profile-menu hidden">
              <div class="profile-info">
                <div class="profile-avatar">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="5"/>
                    <path d="M20 21a8 8 0 1 0-16 0"/>
                  </svg>
                </div>
                <div class="profile-details">
                  <span id="user-email" class="profile-email"></span>
                </div>
              </div>
              <div class="profile-divider"></div>
              <button id="logout-btn" class="profile-logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Se déconnecter</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Zone de chat -->
      <div id="chat-container" class="chat-container">
        <div id="chat-messages" class="chat-messages">
          <!-- Message de bienvenue -->
          <div class="message assistant">
            <div class="message-avatar">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                <path d="M2 12h20"/>
              </svg>
            </div>
            <div class="message-content">
              <p>Bonjour ! Je suis Alcentric, votre assistant IA. Comment puis-je vous aider ?</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Zone de saisie -->
      <div class="chat-input-container">
        <form id="chat-form" class="chat-form">
          <textarea 
            id="chat-input" 
            class="chat-input" 
            placeholder="Écrivez votre message..."
            rows="1"
          ></textarea>
          <button type="submit" id="send-btn" class="send-btn" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
